<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow border-0" style="width: 400px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Acceso</h2>
                <p class="text-muted">Gestión de Biblioteca IES</p>
            </div>

            @if (mensajeError) {
            <div class="alert alert-danger text-center">{{ mensajeError }}</div>
            }

            <form (ngSubmit)="hacerLogin()">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Usuario</label>
                    <input type="text" class="form-control" name="username" [(ngModel)]="credenciales.username"
                        required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Contraseña</label>
                    <input type="password" class="form-control" name="password" [(ngModel)]="credenciales.password"
                        required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Iniciar Sesión</button>
            </form>
        </div>
    </div>
</div>
