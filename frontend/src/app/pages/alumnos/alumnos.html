<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="h3 mb-0 text-gray-800">🎓 Gestión de Alumnos</h2>
  <button class="btn btn-primary shadow-sm">
    + Nuevo Alumno
  </button>
</div>

<div class="card shadow-sm border-0">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        
        <thead class="table-light">
          <tr>
            <th class="px-4">ID</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Tramo</th>
            <th>Bilingüe</th>
            <th class="text-end px-4">Acciones</th>
          </tr>
        </thead>

        <tbody>
          @for (alumno of alumnos; track alumno.id) {
            <tr>
              <td class="px-4 fw-bold text-secondary">#{{ alumno.id }}</td>
              <td>{{ alumno.nombre }}</td>
              <td>{{ alumno.apellidos }}</td>
              
              <td>
                <span class="badge" 
                      [ngClass]="{
                        'text-bg-success': alumno.tramo === 'I', 
                        'text-bg-info text-white': alumno.tramo === 'II', 
                        'text-bg-secondary': alumno.tramo === 'Ninguno'
                      }">
                  {{ alumno.tramo }}
                </span>
              </td>
              
              <td>
                @if (alumno.bilingue === 'S') {
                  <span class="badge text-bg-primary">Sí</span>
                } @else {
                  <span class="badge text-bg-danger">No</span>
                }
              </td>
              
              <td class="text-end px-4">
                <button class="btn btn-sm btn-outline-secondary me-2">✏️ Editar</button>
                <button class="btn btn-sm btn-outline-danger">🗑️ Borrar</button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="6" class="text-center py-4 text-muted">
                No hay alumnos registrados en el sistema.
              </td>
            </tr>
          }
        </tbody>

      </table>
    </div>
  </div>
</div>
