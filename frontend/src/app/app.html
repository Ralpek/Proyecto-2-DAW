@if (!esPaginaLogin()) {
<app-navbar></app-navbar>

@if (notificacion.mensaje() !== '') {
<div
  class="alert alert-success alert-dismissible fade show shadow position-fixed top-0 start-50 translate-middle-x mt-3 z-3"
  role="alert" style="min-width: 300px; text-align: center;">
  {{ notificacion.mensaje() }}
  <button type="button" class="btn-close" (click)="notificacion.cerrar()"></button>
</div>
}

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-none d-md-block bg-light sidebar" style="min-height: 100vh;">
      <app-sidebar></app-sidebar>
    </nav>
    <main class="col-md-10 ms-sm-auto px-md-4 mt-4">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
} @else {
<div class="bg-light min-vh-100">
  <router-outlet></router-outlet>
</div>
}
