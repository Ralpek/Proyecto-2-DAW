<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="h3 mb-0 text-gray-800">Gestión de Materias</h2>
  
  <div class="d-flex gap-2">
    <input type="file" #fileInput style="display: none" accept=".json" (change)="importarJSON($event)">
    <button class="btn btn-outline-secondary shadow-sm" (click)="fileInput.click()">Importar</button>
    <button class="btn btn-outline-success shadow-sm" (click)="exportarJSON()">Exportar</button>
    <button class="btn btn-primary shadow-sm" (click)="abrirModal()">+ Nueva Materia</button>
  </div>
</div>

<div class="card shadow-sm border-0">
  <div class="card-body p-0">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th class="px-4">ID</th>
          <th>Nombre</th>
          <th>Departamento</th>
          <th class="text-end px-4">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (materia of materias; track materia.id) {
          <tr>
            <td class="px-4 text-secondary">#{{ materia.id }}</td>
            <td class="fw-bold">{{ materia.nombre }}</td>
            <td>{{ materia.departamento }}</td>
            <td class="text-end px-4">
              <button class="btn btn-sm btn-outline-danger" (click)="eliminarMateria(materia.id)">Eliminar</button>
            </td>
          </tr>
        } @empty {
          <tr><td colspan="4" class="text-center py-4 text-muted">No hay materias.</td></tr>
        }
      </tbody>
    </table>
  </div>
</div>

@if (mostrarModal) {
  <div class="modal-backdrop fade show"></div>
  <div class="modal fade show d-block" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content shadow">
        <div class="modal-header bg-light">
          <h5 class="modal-title fw-bold">Añadir Materia</h5>
          <button type="button" class="btn-close" (click)="cerrarModal()"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">Nombre</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaMateria.nombre">
          </div>
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">Departamento</label>
            <input type="text" class="form-control" [(ngModel)]="nuevaMateria.departamento">
          </div>
        </div>
        <div class="modal-footer bg-light">
          <button class="btn btn-outline-secondary" (click)="cerrarModal()">Cancelar</button>
          <button class="btn btn-primary" (click)="guardarMateria()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
}
